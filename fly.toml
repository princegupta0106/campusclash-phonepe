app = 'campusclash-phonepe'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = 'campusclash_data'
  destination = '/data'

[env]
  PORT = '8080'
  DB_PATH = '/data/campusclash.db'
